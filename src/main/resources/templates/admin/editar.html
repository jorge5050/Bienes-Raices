<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Propiedad - Bienes Raíces</title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
    <style>
        .alerta {
            padding: 1rem;
            margin: 1rem 0;
            border-radius: 5px;
            font-weight: bold;
            text-align: center;
        }
        .error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .exito {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .imagen-previa {
            width: 200px;
            display: block;
            margin: 1rem 0;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

<main class="contenedor seccion">
    <h1>Editar Propiedad</h1>

    <div th:if="${error}" class="alerta error">
        <p th:text="${error}"></p>
    </div>
    <div th:if="${exito}" class="alerta exito">
        <p th:text="${exito}"></p>
    </div>

    <a th:href="@{/admin/dashboard}" class="boton-verde">Volver</a>

    <form class="formulario" th:action="@{/admin/propiedades/actualizar}" th:object="${propiedad}" method="POST" enctype="multipart/form-data">

        <input type="hidden" th:field="*{id}">

        <fieldset>
            <legend>Información General</legend>

            <label for="titulo">Título:</label>
            <input type="text" th:field="*{titulo}" id="titulo" placeholder="Título Propiedad" required>

            <label for="precio">Precio:</label>
            <input type="number" th:field="*{precio}" id="precio" placeholder="Precio Propiedad" required>

            <label>Imagen Actual:</label>
            <div th:if="*{imagen != null}">
                <img th:src="@{'/img/uploads/' + *{imagen}}" alt="Imagen Propiedad" class="imagen-previa">
                <p style="font-size: 0.8rem; color: #666;">Nombre actual: <span th:text="*{imagen}"></span></p>
            </div>

            <label for="archivoImagen">Cambiar Imagen (opcional):</label>
            <input type="file" id="archivoImagen" name="archivoImagen" accept="image/jpeg, image/png, image/webp">
            <p class="ayuda">Si no seleccionas un archivo, se mantendrá la imagen actual.</p>

            <label for="descripcion">Descripción:</label>
            <textarea th:field="*{descripcion}" id="descripcion" required></textarea>
        </fieldset>

        <fieldset>
            <legend>Información Propiedad</legend>

            <label for="habitaciones">Habitaciones:</label>
            <input type="number" th:field="*{habitaciones}" id="habitaciones" min="1" max="9" required>

            <label for="wc">Baños:</label>
            <input type="number" th:field="*{wc}" id="wc" min="1" max="9" required>

            <label for="estacionamiento">Estacionamiento:</label>
            <input type="number" th:field="*{estacionamiento}" id="estacionamiento" min="0" max="9" required>
        </fieldset>

        <input type="submit" value="Guardar Cambios" class="boton-verde">
    </form>
</main>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        const inputImagen = document.querySelector('#archivoImagen');

        inputImagen.addEventListener('change', function(e) {
            const archivo = e.target.files[0];

            if (archivo) {
                const tiposPermitidos = ['image/jpeg', 'image/png', 'image/webp'];

                // 1. Validar que sea una imagen permitida
                if (!tiposPermitidos.includes(archivo.type)) {
                    alert('¡Archivo no permitido! Por favor, selecciona solo imágenes (JPG, PNG o WEBP).');
                    e.target.value = ''; // VACÍA EL CAMPO PARA QUE NO SE ENVÍE
                    return;
                }

                // 2. Validar tamaño (2MB = 2,097,152 bytes)
                if (archivo.size > 2097152) {
                    alert('La imagen es demasiado pesada. El límite es de 2MB.');
                    e.target.value = ''; // VACÍA EL CAMPO
                    return;
                }
            }
        });
    });
</script>

</body>
</html>
