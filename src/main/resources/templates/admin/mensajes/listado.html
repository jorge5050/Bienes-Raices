<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bandeja de Mensajes - Bienes Raíces</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">

    <style>
        .contenedor-mensajes {
            margin-top: 3rem;
            margin-bottom: 3rem;
        }

        h2 {
            text-align: center;
            font-weight: 300;
            margin-bottom: 2rem;
        }

        /* Envoltura para scroll horizontal en tablets */
        .table-responsive-custom {
            overflow-x: auto;
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .tabla-mensajes {
            width: 100%;
            margin-bottom: 0;
        }

        .tabla-mensajes thead {
            background-color: #333333;
            color: #ffffff;
        }

        .tabla-mensajes th {
            padding: 1rem;
            font-size: 0.9rem;
            text-transform: uppercase;
        }

        .tabla-mensajes td {
            padding: 1rem;
            vertical-align: middle;
            font-size: 1rem;
            border-bottom: 1px solid #eee;
        }

        /* Estilo para el texto del mensaje */
        .col-mensaje {
            min-width: 200px;
            max-width: 300px;
            white-space: normal;
            word-wrap: break-word;
        }

        .btn-eliminar {
            background-color: #e63946;
            color: white;
            border-radius: 50%;
            width: 35px;
            height: 35px;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            transition: 0.3s;
        }

        .btn-eliminar:hover { background-color: #c1121f; }

        /* --- MAGIA RESPONSIVA PARA MÓVILES --- */
        @media (max-width: 768px) {
            .tabla-mensajes thead {
                display: none; /* Escondemos los títulos en móvil */
            }

            .tabla-mensajes, .tabla-mensajes tbody, .tabla-mensajes tr, .tabla-mensajes td {
                display: block;
                width: 100%;
            }

            .tabla-mensajes tr {
                margin-bottom: 1.5rem;
                border: 1px solid #ddd;
                border-radius: 8px;
                padding: 1rem;
                background: #fff;
            }

            .tabla-mensajes td {
                text-align: right;
                padding-left: 50%;
                position: relative;
                border-bottom: 1px solid #f0f0f0;
            }

            /* Agregamos etiquetas antes de cada dato */
            .tabla-mensajes td::before {
                content: attr(data-label);
                position: absolute;
                left: 1rem;
                width: 45%;
                font-weight: bold;
                text-align: left;
                color: #333;
            }

            .col-mensaje { max-width: none; }
            .btn-eliminar { margin-left: auto; }
        }
    </style>
</head>
<body>

<div class="container mt-5">
    <main class="contenedor-mensajes">
        <h2>Gestión de Mensajes</h2>

        <div class="d-flex justify-content-between align-items-center mb-4">
            <a th:href="@{/admin/dashboard}" class="btn btn-warning">Volver al Dashboard</a>
            <span class="badge bg-dark" th:text="${mensajes.size() + ' Mensajes totales'}"></span>
        </div>

        <div class="table-responsive-custom">
            <table class="tabla-mensajes">
                <thead>
                <tr>
                    <th>Remitente</th>
                    <th>Contacto</th>
                    <th>Propiedad</th>
                    <th>Presupuesto</th>
                    <th>Mensaje</th>
                    <th>Acción</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="mensaje : ${mensajes}">
                    <td data-label="Remitente">
                        <strong th:text="${mensaje.nombre}"></strong>
                    </td>
                    <td data-label="Contacto">
                        <div class="d-flex flex-column">
                            <small th:text="${mensaje.correo}"></small>
                            <small class="text-muted" th:text="${mensaje.telefono}"></small>
                        </div>
                    </td>
                    <td data-label="Propiedad" th:text="${mensaje.tipo_propiedad}"></td>
                    <td data-label="Presupuesto">$<span th:text="${mensaje.presupuesto}"></span></td>
                    <td data-label="Mensaje" class="col-mensaje" th:text="${mensaje.mensaje}"></td>
                    <td data-label="Acción">
                        <form th:action="@{/admin/mensajes/eliminar}" method="POST"
                              onsubmit="return confirm('¿Eliminar permanentemente?')">
                            <input type="hidden" name="id" th:value="${mensaje.id}">
                            <button type="submit" class="btn-eliminar">&times;</button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </main>
</div>

</body>
</html>
