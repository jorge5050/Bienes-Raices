<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${propiedad.titulo}">Detalle de Propiedad</title>
<!--    <link rel="stylesheet" th:href="@{/css/app.css}">-->

    <style>
        body {
     background-color: #FE EF 6D; /* Un negro suave, no puro */
     color: #E0E0E0; /* Texto gris muy claro para legibilidad */
     font-family: 'Lato', sans-serif;
     }

 .contenedor {
     background-color: #28A745; /* Las "cajas" de contenido un poco más claras */
     padding: 2rem;
     border-radius: 1rem;
 }

 h1, h2 {
     color: black; /* Títulos en el amarillo de tu marca */
 }
         /* Estilos para el Footer */
 .footer {
     background-color: #333333; /* Color oscuro diferente al body */
     padding: 3rem 0;
     margin-top: 5rem;
     color: #ffffff;
 }

 /* Centrado de la Navegación */
 .navegacion {
     display: flex;
     justify-content: center; /* Centra los enlaces horizontalmente */
     gap: 2rem; /* Separación entre cada enlace */
     margin-bottom: 2rem;
 }

 .navegacion a {
     color: #ffffff;
     text-decoration: none;
     font-size: 1.8rem;
 }

 .navegacion a:hover {
     color: #feef6d; /* Un tono amarillo al pasar el mouse */
 }

 /* Centrado y separación de Derechos Reservados */
 .copyright {
     text-align: center;
     margin-top: 4rem; /* Separación respecto a la navegación */
     font-size: 1.4rem;
     color: #aaaaaa;
     border-top: 1px solid #444; /* Una línea sutil para separar */
     padding-top: 2rem;
 }


    </style>
</head>

<body>

<main class="contenedor seccion contenido-centrado">
    <h1 th:text="${propiedad.titulo}">Título de la Casa</h1>

    <img loading="lazy" th:src="@{'/img/uploads/' + ${propiedad.imagen}}" alt="imagen de la propiedad">

    <div class="resumen-propiedad">
        <p class="precio" th:text="${'$' + #numbers.formatDecimal(propiedad.precio, 0, 'COMMA', 0, 'POINT')}"></p>

        <ul class="iconos-caracteristicas">
            <li>
                <img class="icono" loading="lazy" src="/img/icono_wc.svg" alt="icono wc">
                <p th:text="${propiedad.wc}">0</p>
            </li>

            <li>
                <img class="icono" loading="lazy" src="/img/icono_estacionamiento.svg" alt="icono estacionamiento">
                <p>
                    <span th:text="${propiedad.estacionamiento > 0 ? 'Sí (' + propiedad.estacionamiento + ')' : 'No'}"></span>
                </p>
            </li>

            <li>
                <img class="icono" loading="lazy" src="/img/icono_dormitorio.svg" alt="icono habitaciones">
                <p th:text="${propiedad.habitaciones}">0</p>
            </li>
        </ul>

        <div class="descripcion-larga">
            <p th:text="${propiedad.descripcion}"></p>
        </div>

        <div class="alinear-derecha">
            <a th:href="@{/anuncios}" class="boton-amarillo">Volver</a>
        </div>
    </div>
</main>

<footer class="footer seccion">
    <div class="contenedor contenedor-footer">
        <nav class="navegacion">
            <a th:href="@{/nosotros}">Nosotros</a>
            <a th:href="@{/anuncios}">Anuncios</a>
            <a th:href="@{/blog}">Blog</a>
            <a th:href="@{/contacto}">Contacto</a>
        </nav>
    </div>
    <p class="copyright">Todos los derechos Reservados &copy;</p>
</footer>

</body>
</html>
